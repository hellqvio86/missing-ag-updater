name: CI/CD

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      job:
        description: 'Select which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - lint
          - test
          - draft-release
          - publish

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'lint'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'test'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: |
          uv run pytest --verbose

  all-checks:
    name: All Checks Passed
    if: always()
    needs: [lint, test]
    outputs:
      success: ${{ steps.check.outputs.success }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        id: check
        run: |
          LINT_RESULT="${{ needs.lint.result }}"
          TEST_RESULT="${{ needs.test.result }}"
          if [[ "$LINT_RESULT" == "success" || "$LINT_RESULT" == "skipped" ]] && \
             [[ "$TEST_RESULT" == "success" || "$TEST_RESULT" == "skipped" ]]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "All executed checks passed!"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "One or more checks failed"
            exit 1
          fi

  draft-release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: [all-checks]
    if: |
      always() &&
      needs.all-checks.outputs.success == 'true' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'draft-release'))
      )
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check version change
        id: check_version
        shell: bash
        run: |
          CURRENT_VERSION=$(grep -m 1 '^version =' pyproject.toml | cut -d '"' -f 2)
          PREVIOUS_VERSION=$(git show HEAD~1:pyproject.toml 2>/dev/null | grep -m 1 '^version =' | cut -d '"' -f 2 || echo "")

          if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git tag
        if: steps.check_version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check_version.outputs.version }}" -m "Release v${{ steps.check_version.outputs.version }}"
          git push origin "v${{ steps.check_version.outputs.version }}"

      - name: Build package
        if: steps.check_version.outputs.changed == 'true'
        run: |
          uv build

      - name: Generate SBOM
        if: steps.check_version.outputs.changed == 'true'
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Create Release Draft
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.check_version.outputs.version }}
          name: v${{ steps.check_version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            sbom.spdx.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: [all-checks]
    environment:
      name: pypi
      url: https://pypi.org/p/missing-ag-updater
    if: |
      always() &&
      needs.all-checks.outputs.success == 'true' &&
      (
        (github.event_name == 'release' && github.event.action == 'published') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'publish')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: sbom.spdx.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  sbom:
    name: Generate and Upload SBOM
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'publish' || inputs.job == 'draft-release'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
